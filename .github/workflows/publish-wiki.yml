name: Publish Wiki

on:
  push:
    branches: [main, master]
    paths:
      - 'doc/wiki/**'
  workflow_dispatch:

jobs:
  publish-wiki:
    name: Publish to GitHub Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Publish Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/publish-wiki.js $GITHUB_TOKEN
