# Release Workflow v0.1.0
# IMPORTANT: Binaires non signés (sans codesigning) pour cette version initiale
# 
# Pourquoi pas de certificat ?
# - Simplification de la release initiale (v0.1.0)
# - Pas de compte Apple Developer ($99/an) ou Microsoft EV (coûteux)
# - Focus sur la validation du produit avant investissement
# 
# Impact utilisateur:
# - macOS: Avertissement Gatekeeper → utiliser `xattr -cr Rune-API-Client.app`
# - Windows: SmartScreen → clic "Plus d'infos" puis "Exécuter quand même"
# - Linux: Aucun impact (AppImage/deb standard)
#
# Roadmap: Codesigning prévu pour v0.2.0 avec certificats officiels

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # macOS build
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Clear npm cache
        run: npm cache clean --force
      
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked
      
      - name: Build macOS universal binary
        run: cargo tauri build --target universal-apple-darwin
        working-directory: src-tauri
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  # Windows build
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Clear npm cache
        run: npm cache clean --force
      
      - name: Install dependencies
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
          Remove-Item -Force package-lock.json -ErrorAction SilentlyContinue
          npm install
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked
      
      - name: Build Windows
        run: cargo tauri build
        working-directory: src-tauri
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  # Linux build
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Clear npm cache
        run: npm cache clean --force
      
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked
      
      - name: Build Linux
        run: cargo tauri build
        working-directory: src-tauri
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb

  # Create GitHub Release
  publish:
    name: Publish Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false
      
      - name: Display structure
        run: ls -R artifacts
      
      - name: Create updater manifest
        run: |
          cat > latest.json << 'EOF'
          {
            "version": "${{ github.ref_name }}",
            "notes": "See CHANGELOG.md for release notes",
            "pub_date": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "platforms": {
              "darwin-universal": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Rune-API-Client_${{ github.ref_name }}_universal.dmg"
              },
              "darwin-aarch64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Rune-API-Client_${{ github.ref_name }}_universal.dmg"
              },
              "darwin-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Rune-API-Client_${{ github.ref_name }}_universal.dmg"
              },
              "linux-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Rune-API-Client_${{ github.ref_name }}_amd64.AppImage"
              },
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Rune-API-Client_${{ github.ref_name }}_x64-setup.exe"
              }
            }
          }
          EOF
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/macos-artifacts/**/*.dmg
            artifacts/windows-artifacts/**/*.msi
            artifacts/windows-artifacts/**/*.exe
            artifacts/linux-artifacts/**/*.AppImage
            artifacts/linux-artifacts/**/*.deb
            latest.json
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
