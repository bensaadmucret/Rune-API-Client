# Release Workflow v0.1.0
# IMPORTANT: Binaires non signés (sans codesigning) pour cette version initiale
# 
# Pourquoi pas de certificat ?
# - Simplification de la release initiale (v0.1.0)
# - Pas de compte Apple Developer ($99/an) ou Microsoft EV (coûteux)
# - Focus sur la validation du produit avant investissement
# 
# Impact utilisateur:
# - macOS: Avertissement Gatekeeper → utiliser `xattr -cr Rune-API-Client.app`
# - Windows: SmartScreen → clic "Plus d'infos" puis "Exécuter quand même"
# - Linux: Aucun impact (AppImage/deb standard)
#
# Roadmap: Codesigning prévu pour v0.2.0 avec certificats officiels

name: Release

permissions:
  contents: write
  actions: read

on:
  push:
    tags:
      - 'v*'

jobs:
  # macOS build
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Clear npm cache
        run: npm cache clean --force
      
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked
      
      - name: Build macOS universal binary
        run: cd src-tauri && cargo tauri build --target universal-apple-darwin
      
      - name: Debug bundle files
        run: |
          echo "=== All files in target ==="
          find src-tauri/target -type f -name "*.dmg" -o -name "*.app" -o -name "*.msi" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" 2>/dev/null || true
          echo "=== Bundle directory structure ==="
          ls -laR src-tauri/target/*/release/bundle/ 2>/dev/null || ls -laR src-tauri/target/release/bundle/ 2>/dev/null || echo "No bundle directory found"
          echo "=== All target contents ==="
          find src-tauri/target -maxdepth 4 -type d | head -30
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # Windows build
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Clear npm cache
        run: npm cache clean --force
      
      - name: Install dependencies
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
          Remove-Item -Force package-lock.json -ErrorAction SilentlyContinue
          npm install
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked
      
      - name: Build Windows
        run: cd src-tauri && cargo tauri build
      
      - name: Debug bundle files
        shell: pwsh
        run: |
          Write-Host "=== All files in target ==="
          Get-ChildItem -Recurse src-tauri/target -Include "*.msi","*.exe","*.dmg","*.AppImage","*.deb" | Select-Object FullName
          Write-Host "=== Bundle directory structure ==="
          if (Test-Path src-tauri/target/release/bundle) { Get-ChildItem -Recurse src-tauri/target/release/bundle } else { Write-Host "No bundle in release" }
          if (Test-Path src-tauri/target/x86_64-pc-windows-msvc/release/bundle) { Get-ChildItem -Recurse src-tauri/target/x86_64-pc-windows-msvc/release/bundle } else { Write-Host "No bundle in x86_64-pc-windows-msvc" }
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error

  # Linux build
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Clear npm cache
        run: npm cache clean --force
      
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked
      
      - name: Build Linux
        run: cd src-tauri && cargo tauri build
      
      - name: Debug bundle files
        run: |
          echo "=== All files in target ==="
          find src-tauri/target -type f \( -name "*.AppImage" -o -name "*.deb" \) 2>/dev/null || true
          echo "=== Bundle directory structure ==="
          ls -laR src-tauri/target/*/release/bundle/ 2>/dev/null || ls -laR src-tauri/target/release/bundle/ 2>/dev/null || echo "No bundle directory found"
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          if-no-files-found: error

  # Create GitHub Release
  publish:
    name: Publish Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/macos
      
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows
      
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts/linux
      
      - name: Display structure
        run: |
          if [ -d artifacts ]; then
            ls -laR artifacts
          else
            echo "No artifacts directory found"
            echo "Checking for downloaded files..."
            ls -la
          fi

      - name: Resolve asset names
        run: |
          MAC_DMG="$(find artifacts -type f -name '*.dmg' | head -n1)"
          WIN_EXE="$(find artifacts -type f -name '*.exe' | head -n1)"
          LINUX_APPIMAGE="$(find artifacts -type f -name '*.AppImage' | head -n1)"

          if [ -z "$MAC_DMG" ] || [ -z "$WIN_EXE" ] || [ -z "$LINUX_APPIMAGE" ]; then
            echo "Missing required release artifacts"
            echo "MAC_DMG=$MAC_DMG"
            echo "WIN_EXE=$WIN_EXE"
            echo "LINUX_APPIMAGE=$LINUX_APPIMAGE"
            exit 1
          fi

          echo "MAC_DMG_NAME=$(basename "$MAC_DMG")" >> "$GITHUB_ENV"
          echo "WIN_EXE_NAME=$(basename "$WIN_EXE")" >> "$GITHUB_ENV"
          echo "LINUX_APPIMAGE_NAME=$(basename "$LINUX_APPIMAGE")" >> "$GITHUB_ENV"
      
      - name: Create updater manifest
        run: |
          cat > latest.json << EOF
          {
            "version": "${{ github.ref_name }}",
            "notes": "See CHANGELOG.md for release notes",
            "pub_date": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "platforms": {
              "darwin-universal": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${MAC_DMG_NAME}"
              },
              "darwin-aarch64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${MAC_DMG_NAME}"
              },
              "darwin-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${MAC_DMG_NAME}"
              },
              "linux-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${LINUX_APPIMAGE_NAME}"
              },
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${WIN_EXE_NAME}"
              }
            }
          }
          EOF
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
            latest.json
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
