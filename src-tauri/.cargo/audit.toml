[advisories]
# Ignore warnings from Tauri/GTK ecosystem - these are transitive dependencies
# that require upstream fixes from Tauri/WebKit team
ignore = [
    # rsa Marvin Attack - transitive via sqlx-mysql (unused, SQLite only)
    "RUSTSEC-2023-0071",
    # glib unsoundness - VariantStrIter (transitive via Tauri/WebKit)
    "RUSTSEC-2024-0370",
    "RUSTSEC-2024-0429",
    # gtk-rs GTK3 bindings no longer maintained (transitive via Tauri)
    "RUSTSEC-2024-0411",  # gdkwayland-sys
    "RUSTSEC-2024-0412",  # gdk
    "RUSTSEC-2024-0413",  # pango-sys
    "RUSTSEC-2024-0414",  # gdkx11-sys
    "RUSTSEC-2024-0415",  # gtk
    "RUSTSEC-2024-0416",  # atk-sys
    "RUSTSEC-2024-0417",  # gdkx11
    "RUSTSEC-2024-0418",  # gdk-sys
    "RUSTSEC-2024-0419",  # gtk-sys
    "RUSTSEC-2024-0420",  # atk
    # fxhash unmaintained (transitive via Tauri)
    "RUSTSEC-2025-0057",
    # unic-* unmaintained (transitive via urlpattern in Tauri)
    "RUSTSEC-2025-0075",  # unic-char-range
    "RUSTSEC-2025-0080",  # unic-common
    "RUSTSEC-2025-0081",  # unic-char-property
    "RUSTSEC-2025-0098",  # unic-ucd-version
    "RUSTSEC-2025-0100",  # unic-ucd-ident
    # rand - unsoundness with custom loggers (conditional, not applicable)
    "RUSTSEC-2026-0097",
    # rustls-webpki - TLS certificate path validation (fixed in 0.103.12+)
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
]

[output]
quiet = false
show_tree = true
