# Cargo Audit Configuration
# https://github.com/rustsec/rustsec/blob/main/cargo-audit/src/config.rs

[advisories]
# Vulnerabilities to ignore temporarily
# RUSTSEC-2023-0071: Marvin Attack in rsa crate
# - Severity: Medium (5.9)
# - No fixed upgrade available
# - Comes via sqlx-mysql -> sqlx transitive dependency
# - Impact: Limited as we don't use MySQL RSA features directly
ignore = ["RUSTSEC-2023-0071"]

# Informational advisories we want to skip
informational_warnings = ["unmaintained", "yanked"]

[output]
# Show dependency tree for vulnerabilities
deny = ["unsound", "yanked"]
quiet = false
show_tree = true
