# Cargo configuration
# See: https://doc.rust-lang.org/cargo/reference/config.html

[alias]
# Quality checks
lint = "clippy --all-targets --all-features -- -D warnings"
lint-fix = "clippy --all-targets --all-features --fix -- -D warnings"
format = "fmt"
format-check = "fmt -- --check"

# Build and check
check-all = "check --all-targets --all-features"
build-release = "build --release"

# Test
test-all = "test --all-targets --all-features"

# Combined quality commands
quality = "fmt && clippy --all-targets --all-features -- -D warnings"
quality-fix = "fmt && clippy --all-targets --all-features --fix -- -D warnings"

# CI command (used in CI/CD)
ci-check = "fmt -- --check && clippy --all-targets --all-features -- -D warnings && test --all-targets --all-features"
