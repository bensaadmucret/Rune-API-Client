<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded rectangle -->
  <rect x="32" y="32" width="448" height="448" rx="80" fill="url(#bgGradient)"/>
  
  <!-- Stylized R letter - just the R without connection dots -->
  <g fill="none" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical stem -->
    <line x1="170" y1="130" x2="170" y2="382"/>
    
    <!-- Top curve/loop of R -->
    <path d="M170 130 L310 130 Q342 130 342 185 Q342 240 310 240 L170 240" />
    
    <!-- Diagonal leg of R -->
    <line x1="170" y1="240" x2="310" y2="382"/>
  </g>
</svg>
